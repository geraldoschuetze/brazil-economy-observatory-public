version: 2

models:
  - name: stg_sgs_observations
    description: >
      Observações tipadas do SGS/BACEN (Sistema Gerenciador de Séries Temporais):
      os valores chegam como texto com separador decimal vírgula na camada raw e
      são convertidos para numérico aqui. Uma linha por série e data, pronta para
      consultas analíticas nos marts.
    columns:
      - name: series_code
        description: >
          Código numérico da série no SGS (ex.: 432 = Selic meta,
          13522 = IPCA acumulado 12 meses, 1 = taxa de câmbio USD/BRL).
        meta:
          om_glossario: "series_code (SGS)"
        tests: [not_null]
      - name: obs_date
        description: "Data de referência da observação da série (YYYY-MM-DD)."
        tests: [not_null]
      - name: value
        description: >
          Valor numérico da observação. A staging converte o texto com vírgula
          decimal (ex.: '13,75') para o tipo numeric do PostgreSQL, pronto para
          cálculos.
        tests: [not_null]

  - name: stg_focus_expectativas
    description: >
      Expectativas medianas do mercado extraídas da pesquisa Focus do BACEN,
      conformadas para a camada marts. Cada linha representa a mediana das
      projeções de instituições financeiras para um indicador e uma data de
      referência futura.
    columns:
      - name: indicador
        description: >
          Nome do indicador projetado (ex.: 'IPCA', 'Selic', 'PIB Total',
          'Taxa de câmbio').
        tests: [not_null]
      - name: data
        description: "Data de divulgação da pesquisa Focus (data da coleta das expectativas)."
        tests: [not_null]
      - name: data_referencia
        description: >
          Período futuro ao qual a expectativa se refere, podendo ser um
          ano (ex.: '2024') ou mês/ano (ex.: '12/2024') dependendo do
          indicador.
        tests: [not_null]
      - name: mediana
        description: >
          Mediana das projeções das instituições participantes para o
          indicador e data de referência, na unidade nativa do indicador
          (% a.a. para Selic e IPCA, R$/US$ para câmbio, % para PIB etc.).
      - name: respondentes
        description: >
          Número de instituições financeiras que responderam à pesquisa
          para esse indicador e data de referência específicos.

  - name: stg_pix_transacoes_municipio
    description: >
      Transações Pix por município, conformadas a partir do BACEN. A staging
      acrescenta a coluna derivada `is_nao_informado` para sinalizar o bucket
      sentinela -1 do BACEN (transações não atribuíveis a um município
      específico), mantido para que os totais nacionais estejam corretos.
    columns:
      - name: anomes
        description: >
          Ano e mês de referência das transações no formato YYYYMM
          (ex.: 202401 = janeiro de 2024).
        tests: [not_null]
      - name: municipio_ibge
        description: >
          Código IBGE de 7 dígitos do município. O valor -1 identifica o
          bucket "NÃO INFORMADO" (transações sem município atribuído).
        tests: [not_null]
      - name: municipio
        description: "Nome do município conforme cadastro IBGE."
      - name: estado_ibge
        description: >
          Código IBGE numérico da UF (ex.: 35 = SP). O valor -1 acompanha
          o bucket "NÃO INFORMADO".
      - name: estado
        description: "Nome completo da unidade federativa."
      - name: sigla_regiao
        description: "Sigla da grande região geográfica (N, NE, CO, SE, S)."
      - name: regiao
        description: "Nome da grande região geográfica (ex.: Sudeste)."
      - name: vl_pagador_pf
        description: >
          Valor total (R$) das transações Pix em que o pagador é uma
          pessoa física, no mês e município.
      - name: qt_pagador_pf
        description: >
          Quantidade de transações Pix em que o pagador é uma pessoa
          física, no mês e município.
      - name: vl_pagador_pj
        description: >
          Valor total (R$) das transações Pix em que o pagador é uma
          pessoa jurídica, no mês e município.
      - name: qt_pagador_pj
        description: >
          Quantidade de transações Pix em que o pagador é uma pessoa
          jurídica, no mês e município.
      - name: vl_recebedor_pf
        description: >
          Valor total (R$) das transações Pix em que o recebedor é uma
          pessoa física, no mês e município.
      - name: qt_recebedor_pf
        description: >
          Quantidade de transações Pix em que o recebedor é uma pessoa
          física, no mês e município.
      - name: vl_recebedor_pj
        description: >
          Valor total (R$) das transações Pix em que o recebedor é uma
          pessoa jurídica, no mês e município.
      - name: qt_recebedor_pj
        description: >
          Quantidade de transações Pix em que o recebedor é uma pessoa
          jurídica, no mês e município.
      - name: qt_pes_pagador_pf
        description: >
          Número de pessoas físicas únicas que realizaram ao menos um
          pagamento Pix no mês e município.
      - name: qt_pes_pagador_pj
        description: >
          Número de pessoas jurídicas únicas que realizaram ao menos um
          pagamento Pix no mês e município.
      - name: qt_pes_recebedor_pf
        description: >
          Número de pessoas físicas únicas que receberam ao menos uma
          transação Pix no mês e município.
      - name: qt_pes_recebedor_pj
        description: >
          Número de pessoas jurídicas únicas que receberam ao menos uma
          transação Pix no mês e município.
      - name: is_nao_informado
        description: >
          Coluna derivada (booleana). Verdadeiro quando `estado_ibge = -1`,
          indicando que a linha pertence ao bucket "NÃO INFORMADO" do BACEN —
          transações sem município de origem identificável. Use para excluir
          ou isolar esses registros em análises geográficas.

  - name: stg_cvm_inf_diario
    description: >
      Informe diário de fundos de investimento da CVM, conformado para a
      camada marts. A staging acrescenta `cnpj_digits` (CNPJ sem pontuação)
      para facilitar a junção com o cadastro de fundos e a CDA, que também
      usam somente dígitos como chave.
    columns:
      - name: cnpj
        description: >
          CNPJ do fundo no formato com pontuação (ex.: 12.345.678/0001-90),
          conforme entregue pela CVM.
        meta:
          om_sensibilidade: "Identificador de Negócio"
          om_glossario: "CNPJ (fundo)"
        tests: [not_null]
      - name: cnpj_digits
        description: >
          CNPJ do fundo normalizado para somente dígitos (14 caracteres), sem
          pontuação. Chave de junção com `stg_cvm_cad_fi` e `stg_cvm_cda_pl`.
        meta:
          om_sensibilidade: "Identificador de Negócio"
          om_glossario: "cnpj_digits"
        tests: [not_null]
      - name: id_subclasse
        description: >
          Identificador de subclasse do fundo conforme o novo enquadramento
          CVM-175 (resolução de 2023). Nulo para fundos no regime anterior à
          resolução.
      - name: dt_comptc
        description: "Data de competência do informe (data de referência dos valores)."
        meta:
          om_glossario: "dt_comptc"
        tests: [not_null]
      - name: tp_fundo
        description: >
          Tipo/regime regulatório do fundo: 'FI' para o regime anterior à
          CVM-175 ou 'FIF' para o regime novo (Fundo de Investimento
          Financeiro pós-CVM-175).
      - name: vl_total
        description: "Valor total da carteira do fundo em R$ na data de competência."
      - name: vl_quota
        description: "Valor da cota do fundo em R$ na data de competência."
        meta:
          om_glossario: "vl_quota"
      - name: vl_patrim_liq
        description: "Patrimônio líquido do fundo em R$ na data de competência."
      - name: captc_dia
        description: "Total de captações (aplicações) recebidas pelo fundo no dia, em R$."
      - name: resg_dia
        description: "Total de resgates pagos pelo fundo no dia, em R$."
      - name: nr_cotst
        description: "Número de cotistas do fundo na data de competência."

  - name: stg_cvm_cad_fi
    description: >
      Cadastro de fundos de investimento da CVM (dimensão, carga completa).
      O CNPJ já é entregue normalizado para somente dígitos pela DAG de
      ingestão, unificando os regimes pré e pós CVM-175. Contém dados
      cadastrais de todos os fundos registrados — nome, situação, classe
      regulatória, gestor e administrador.
    columns:
      - name: cnpj
        description: >
          CNPJ do fundo normalizado para somente dígitos (14 caracteres),
          sem pontuação. Chave primária de junção com o informe diário e a CDA.
        meta:
          om_sensibilidade: "Identificador de Negócio"
        tests: [not_null, unique]
      - name: denom_social
        description: "Denominação social (razão social) do fundo de investimento."
      - name: sit
        description: >
          Situação cadastral do fundo perante a CVM
          (ex.: 'EM FUNCIONAMENTO NORMAL', 'CANCELADA', 'EM LIQUIDAÇÃO').
      - name: classe
        description: >
          Classe regulatória do fundo
          (ex.: 'Fundo de Ações', 'Fundo de Renda Fixa', 'Fundo Multimercado').
      - name: gestor
        description: "Nome do gestor responsável pela administração da carteira do fundo."
      - name: administrador
        description: "Nome do administrador fiduciário do fundo."

  - name: stg_dim_populacao_uf
    description: >
      Estimativas populacionais por unidade federativa do IBGE, usadas como
      denominador para cálculos per capita nos marts de Pix. Tabela pequena
      (27 UFs × anos disponíveis), atualizada anualmente com defasagem.
    columns:
      - name: uf_ibge
        description: >
          Código IBGE numérico da unidade federativa
          (ex.: 35 = São Paulo, 33 = Rio de Janeiro).
        tests: [not_null, unique]
      - name: uf
        description: "Sigla de duas letras da unidade federativa (ex.: SP, RJ, MG)."
      - name: populacao
        description: >
          Estimativa populacional da UF no ano de referência (número de
          habitantes).
        tests:
          - not_null
          - non_negative
      - name: ano
        description: "Ano de referência da estimativa populacional (ex.: 2022, 2023)."

  - name: stg_ipca_aberturas
    description: >
      Variação do IPCA acumulada em 12 meses por grupo de despesa, extraída
      da SIDRA/IBGE (tabela 7060). A staging remove o prefixo numérico do
      rótulo do grupo (ex.: '1.Alimentação e bebidas' → 'Alimentação e
      bebidas') para uso em visualizações. Permite decompor a inflação por
      grupos como alimentação, habitação, saúde e transportes.
    columns:
      - name: mes
        description: >
          Mês de referência da variação do IPCA no formato YYYY-MM-DD
          (primeiro dia do mês).
        tests: [not_null]
      - name: grupo_cod
        description: >
          Código numérico do grupo de despesa no IPCA conforme classificação
          do IBGE (ex.: 1 = Alimentação e bebidas, 2 = Habitação).
        tests: [not_null]
      - name: grupo
        description: >
          Descrição do grupo de despesa sem o prefixo numérico original
          (ex.: 'Alimentação e bebidas'). A staging remove o prefixo
          com `regexp_replace` para facilitar a exibição em gráficos.
      - name: var_12m
        description: >
          Variação acumulada do IPCA nos últimos 12 meses para o grupo,
          em pontos percentuais (ex.: 4,62 representa 4,62% a.a.).

  - name: stg_cvm_cda_pl
    description: >
      Patrimônio líquido mensal por fundo/classe, extraído da CDA (Composição
      e Diversificação das Aplicações) da CVM — arquivo BLC_1. O CNPJ é
      normalizado para somente dígitos para facilitar junções. Linhas com PL
      superior a R$ 1 trilhão são descartadas como proteção contra registros
      corrompidos (nenhum fundo brasileiro real se aproxima desse patamar).
    columns:
      - name: anomes
        description: >
          Ano e mês de competência do demonstrativo no formato YYYYMM
          (ex.: 202312 = dezembro de 2023).
        tests: [not_null]
      - name: cnpj_digits
        description: >
          CNPJ do fundo normalizado para somente dígitos (14 caracteres), sem
          pontuação. Derivado via `translate` do CNPJ com pontuação da fonte
          raw. Chave de junção com `stg_cvm_cad_fi` e `stg_cvm_inf_diario`.
        meta:
          om_sensibilidade: "Identificador de Negócio"
        tests: [not_null]
      - name: vl_patrim_liq
        description: >
          Patrimônio líquido declarado do fundo no mês, em R$. Valores
          superiores a R$ 1 trilhão são descartados na staging como proteção
          contra registros corrompidos (guard de sanidade).
        meta:
          om_glossario: "vl_patrim_liq"

  - name: stg_cvm_cda_cotas
    description: >
      Posições em cotas de outros fundos (arquivo BLC_2 da CDA/CVM), usadas
      para calcular o PL líquido consolidado da indústria sem dupla contagem.
      Cada linha representa a posição de um fundo investidor em cotas de um
      fundo investido ao final do mês. Os CNPJs são normalizados para somente
      dígitos. Linhas com valor de mercado superior a R$ 1 trilhão são
      descartadas como proteção contra registros corrompidos.
    columns:
      - name: anomes
        description: >
          Ano e mês de competência da posição no formato YYYYMM
          (ex.: 202312 = dezembro de 2023).
        tests: [not_null]
      - name: cnpj_investidor_digits
        description: >
          CNPJ do fundo que detém a posição em cotas (fundo investidor),
          normalizado para somente dígitos via `translate`. Derivado do campo
          `cnpj_investidor` da fonte raw.
        meta:
          om_sensibilidade: "Identificador de Negócio"
        tests: [not_null]
      - name: cnpj_investido_digits
        description: >
          CNPJ do fundo cujas cotas são detidas (fundo investido), normalizado
          para somente dígitos. Quando o fundo investido não é identificável
          na base CVM, o `cnpj_investido` é nulo e este campo fica como string
          vazia após o `translate`.
        meta:
          om_sensibilidade: "Identificador de Negócio"
      - name: vl_mercado
        description: >
          Valor de mercado da posição em cotas do fundo investido, em R$,
          no mês de referência. Valores superiores a R$ 1 trilhão são
          descartados na staging como proteção contra registros corrompidos
          (guard de sanidade).
