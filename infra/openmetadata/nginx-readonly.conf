# Read-only reverse proxy for OpenMetadata's PUBLIC surface.
# Browsing (GET/HEAD) and the viewer LOGIN endpoints are allowed; every mutating
# method (PUT/PATCH/DELETE and any other POST) is denied with 403 — so even a
# forged or privilege-escalated token cannot write through this entry point.
# Admin/write work (incl. token minting) is done over the loopback server port
# via SSH tunnel, never here.

# Brute-force protection for the public login endpoint (http context — this file
# is included inside nginx's http {} via conf.d/). 15 req/min per client IP.
limit_req_zone $binary_remote_addr zone=om_login:10m rate=15r/m;

server {
    listen 8585;
    server_name _;
    client_max_body_size 8m;

    # Security headers on every response (inherited by both locations since
    # neither declares its own add_header). `always` so they apply to 403s too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Sentinel: proves a response actually traversed this read-only proxy (used by
    # the deploy assertion and for external verification of the public surface).
    add_header X-OM-Readonly-Proxy "1" always;

    # Auth endpoints: EXACTLY the viewer login/refresh/logout, POST/GET only.
    # Anchored ($) so siblings like generateToken/register/reset are NOT matched —
    # token minting and account mutation are writes and must never be public.
    location ~ ^/api/v1/(auth|users)/(login|refresh|logout)$ {
        limit_except POST GET { deny all; }
        limit_req zone=om_login burst=5 nodelay;
        # Strip method-override headers so a GET can never be re-dispatched as a
        # write by the backend. proxy_set_header does NOT inherit once a location
        # sets any of its own, so these are repeated per-location on purpose.
        proxy_set_header X-HTTP-Method-Override "";
        proxy_set_header X-Method-Override "";
        proxy_set_header X-HTTP-Method "";
        proxy_pass http://openmetadata-server:8585;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # everything else: read-only
    location / {
        limit_except GET HEAD {
            deny all;
        }
        proxy_set_header X-HTTP-Method-Override "";
        proxy_set_header X-Method-Override "";
        proxy_set_header X-HTTP-Method "";
        proxy_pass http://openmetadata-server:8585;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
